name: CI

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]

jobs:
  build:
    name: ${{ matrix.name }}
    runs-on: ${{ matrix.runner }}
    container: ${{ matrix.container }}
    strategy:
      fail-fast: false
      matrix:
        include:
          # Linux x86_64 — manylinux_2_28 (AlmaLinux 8 base, glibc 2.28).
          # Covers Ubuntu 20+, Debian 11+, RHEL 8+, AlmaLinux/Rocky 8+,
          # Fedora 30+. Effectively every modern glibc Linux.
          - name: linux-x86_64
            runner: ubuntu-24.04
            container: quay.io/pypa/manylinux_2_28_x86_64
            archive_ext: tar.gz
            shell: bash

          # Linux ARM64 — same manylinux_2_28 base, native ARM runner.
          # Covers AWS Graviton, Ampere, Raspberry Pi 4+ on 64-bit OS.
          - name: linux-aarch64
            runner: ubuntu-24.04-arm
            container: quay.io/pypa/manylinux_2_28_aarch64
            archive_ext: tar.gz
            shell: bash

          # macOS universal — arm64 + x86_64 fused into one .dylib.
          # Cross-compiled from Apple Silicon. Floor: macOS 11 (Big Sur).
          - name: macos-universal
            runner: macos-14
            container: ''
            archive_ext: tar.gz
            shell: bash
            cmake_extra: >-
              "-DCMAKE_OSX_ARCHITECTURES=arm64;x86_64"
              -DCMAKE_OSX_DEPLOYMENT_TARGET=11.0

          # Windows x86_64 — MSVC + Ninja. windows-2022 = VS 2022 / MSVC 19.
          - name: windows-x86_64
            runner: windows-2022
            container: ''
            archive_ext: zip
            shell: pwsh

    defaults:
      run:
        shell: ${{ matrix.shell }}

    steps:
      - uses: actions/checkout@v4

      # ── Toolchain setup ────────────────────────────────────────────────

      # manylinux containers come with cmake/gcc/git but NOT ninja.
      # EPEL is preinstalled in manylinux_2_28, so this is one yum away.
      - name: Install Ninja (manylinux)
        if: startsWith(matrix.name, 'linux')
        run: yum install -y ninja-build

      - name: Install Ninja (macOS)
        if: runner.os == 'macOS'
        run: brew install ninja

      - name: Install Ninja (Windows)
        if: runner.os == 'Windows'
        run: choco install ninja -y

      # MSVC env vars (cl.exe, link.exe). Required for Ninja on Windows
      # since Ninja doesn't auto-locate VS toolchains the way CMake does
      # with the "Visual Studio" generator.
      - name: Set up MSVC (Windows)
        if: runner.os == 'Windows'
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: x64

      # ── Configure ──────────────────────────────────────────────────────

      # Force-disable every libzip optional dep we don't use, so FetchContent
      # doesn't try to find BZip2/LZMA/Zstd/OpenSSL/etc. on the runner.
      # zlib is the only dep we let through — also vendored via FetchContent.
      - name: Configure
        run: >
          cmake -B build -S cozip/core -G Ninja
          -DCMAKE_BUILD_TYPE=Release
          -DCMAKE_INSTALL_PREFIX=install
          -DCMAKE_INSTALL_LIBDIR=lib
          -DBUILD_SHARED_LIBS=ON
          ${{ matrix.cmake_extra }}

      - name: Build
        run: cmake --build build --config Release --parallel

      # ── Test ───────────────────────────────────────────────────────────

      # On Windows the .dll must be locatable when test binaries run.
      # CMake puts it in build/Release/ or build/ depending on generator;
      # we add both to PATH defensively. On Unix, RPATH or install rules
      # in the CMakeLists handle it.
      - name: Test (Unix)
        if: runner.os != 'Windows'
        run: ctest --test-dir build --output-on-failure -C Release

      - name: Test (Windows)
        if: runner.os == 'Windows'
        run: |
          $env:PATH = "$pwd\build;$pwd\build\Release;" + $env:PATH
          ctest --test-dir build --output-on-failure -C Release

      # ── Install & verify ───────────────────────────────────────────────

      - name: Install
        run: cmake --install build --config Release

      # Sanity-check macOS universal: confirm both arches are actually
      # in the dylib. Fails loudly if FetchContent dependencies somehow
      # produced a thin binary instead of a fat one.
      # Note: cozip/core/CMakeLists.txt sets PREFIX "", so the artifact
      # is cozip.dylib (no "lib" prefix).
      - name: Verify macOS universal
        if: matrix.name == 'macos-universal'
        run: |
          DYLIB=install/lib/cozip.dylib
          lipo -info "$DYLIB"
          ARCHS=$(lipo -archs "$DYLIB")
          echo "Architectures present: $ARCHS"
          echo "$ARCHS" | grep -qw x86_64 || { echo "Missing x86_64 slice"; exit 1; }
          echo "$ARCHS" | grep -qw arm64  || { echo "Missing arm64 slice";  exit 1; }

      # ── Package ────────────────────────────────────────────────────────

      - name: Package (Unix)
        if: runner.os != 'Windows'
        run: |
          VERSION=$(cat VERSION 2>/dev/null || echo "0.0.0-dev")
          PKG="libcozip-${VERSION}-${{ matrix.name }}"
          mkdir -p "dist/${PKG}"
          cp -r install/include "dist/${PKG}/"
          cp -r install/lib "dist/${PKG}/"
          [ -f LICENSE ] && cp LICENSE "dist/${PKG}/" || true
          [ -f README.md ] && cp README.md "dist/${PKG}/" || true
          cd dist && tar czf "${PKG}.tar.gz" "${PKG}"
          ls -la

      # On Windows the runtime .dll lives in install/bin/, the import .lib
      # in install/lib/. Both must ship.
      - name: Package (Windows)
        if: runner.os == 'Windows'
        run: |
          $version = if (Test-Path VERSION) { Get-Content VERSION } else { "0.0.0-dev" }
          $pkg = "libcozip-$version-${{ matrix.name }}"
          New-Item -ItemType Directory -Force -Path "dist/$pkg" | Out-Null
          Copy-Item -Recurse install/include "dist/$pkg/"
          Copy-Item -Recurse install/lib     "dist/$pkg/"
          Copy-Item -Recurse install/bin     "dist/$pkg/" -ErrorAction SilentlyContinue
          if (Test-Path LICENSE)   { Copy-Item LICENSE   "dist/$pkg/" }
          if (Test-Path README.md) { Copy-Item README.md "dist/$pkg/" }
          Compress-Archive -Path "dist/$pkg" -DestinationPath "dist/$pkg.zip"
          Get-ChildItem dist

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: libcozip-${{ matrix.name }}
          path: dist/libcozip-*.${{ matrix.archive_ext }}
          if-no-files-found: error

  # ── Release ──────────────────────────────────────────────────────────────
  # Triggered only by version tags (vX.Y.Z). Collects all 4 platform
  # archives and publishes them as a GitHub release.
  release:
    name: Release
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: List artifacts
        run: ls -la artifacts/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/libcozip-*
          generate_release_notes: true
          draft: false
          prerelease: ${{ contains(github.ref, '-') }}