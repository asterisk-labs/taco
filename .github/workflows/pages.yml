name: Pages

on:
  push:
    branches: [main]
    paths:
      - ".github/workflows/pages.yml"
      - ".nojekyll"
      - "deck/**"
      - "cozip/Makefile"
      - "cozip/core/**"
      - "cozip/images/**"
      - "cozip/javascript/**"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    name: Build static site
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install build tools
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake make ninja-build python3

      - name: Install Emscripten
        run: |
          git clone --depth 1 https://github.com/emscripten-core/emsdk.git "$RUNNER_TEMP/emsdk"
          "$RUNNER_TEMP/emsdk/emsdk" install latest
          "$RUNNER_TEMP/emsdk/emsdk" activate latest

      - name: Build cozip WASM
        run: |
          source "$RUNNER_TEMP/emsdk/emsdk_env.sh"
          make -C cozip wasm

      - name: Smoke test WASM wrapper
        run: |
          source "$RUNNER_TEMP/emsdk/emsdk_env.sh"
          node --input-type=module <<'EOF'
          import path from "node:path";
          import createFactory from "./cozip/javascript/wasm/cozip.js";
          import { createCozipWasmWriter } from "./cozip/javascript/src/cozip-wasm-wrapper.js";

          const writer = await createCozipWasmWriter({
            factory: createFactory,
            locateFile: (file) => path.join(process.cwd(), "cozip/javascript/wasm", file),
          });

          const bytes = await writer.writeArchive({
            entries: [
              {
                name: "hello.txt",
                data: new TextEncoder().encode("hello from pages\n"),
                inIndex: true,
              },
            ],
          });

          if (bytes[0] !== 0x50 || bytes[1] !== 0x4b || bytes.length < 32819) {
            throw new Error(`unexpected ZIP output length=${bytes.length}`);
          }

          console.log(`WASM smoke ZIP: ${bytes.length} bytes`);
          EOF

      - name: Assemble static site
        run: |
          rm -rf _site
          mkdir -p _site/cozip/javascript
          cp -R deck _site/deck
          cp -R cozip/images _site/cozip/images
          cp -R cozip/javascript/src _site/cozip/javascript/src
          cp -R cozip/javascript/wasm _site/cozip/javascript/wasm
          cp .nojekyll _site/.nojekyll
          if [ -f CNAME ]; then cp CNAME _site/CNAME; fi
          find _site -maxdepth 4 -type f | sort

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: _site

  deploy:
    name: Deploy static site
    needs: build
    runs-on: ubuntu-24.04
    permissions:
      contents: read
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
