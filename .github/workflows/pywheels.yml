name: Wheels

# Builds Python wheels by:
#   1. Building libcozip via CMake (same as ci.yml).
#   2. Dropping the compiled native lib into python/cozip/_lib/.
#   3. Running `python -m build --wheel` so hatchling packages it.
#   4. Repairing the wheel so PyPI accepts the platform tag:
#        - Linux: linux_*  -> manylinux_2_28_*  (auditwheel)
#        - macOS: macosx_14_0_arm64 -> macosx_11_0_universal2 (delocate + wheel)
#        - Windows: win_amd64 is accepted as-is.
#
# Because cozip uses cffi in ABI mode (ffi.dlopen at runtime), one wheel
# covers all Python 3.10+ versions on a given OS+arch. So we get 4
# wheels total, not 16.
#
# Triggered by tags v* for releases, by manual dispatch otherwise.

on:
  push:
    tags: ['v*']
  workflow_dispatch:
  pull_request:
    paths:
      - 'cozip/python/**'
      - '.github/workflows/pywheels.yml'

jobs:
  build-wheels:
    name: Wheel — ${{ matrix.name }}
    runs-on: ${{ matrix.runner }}
    container: ${{ matrix.container }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: linux-x86_64
            runner: ubuntu-24.04
            container: quay.io/pypa/manylinux_2_28_x86_64
            lib_ext: so
            shell: bash
            manylinux_plat: manylinux_2_28_x86_64

          - name: linux-aarch64
            runner: ubuntu-24.04-arm
            container: quay.io/pypa/manylinux_2_28_aarch64
            lib_ext: so
            shell: bash
            manylinux_plat: manylinux_2_28_aarch64

          - name: macos-universal
            runner: macos-14
            container: ''
            lib_ext: dylib
            shell: bash
            cmake_extra: >-
              "-DCMAKE_OSX_ARCHITECTURES=arm64;x86_64"
              -DCMAKE_OSX_DEPLOYMENT_TARGET=11.0

          - name: windows-x86_64
            runner: windows-2022
            container: ''
            lib_ext: dll
            shell: pwsh

    defaults:
      run:
        shell: ${{ matrix.shell }}

    steps:
      - uses: actions/checkout@v4

      # ── Toolchain ──────────────────────────────────────────────────────

      - name: Install Ninja (manylinux)
        if: startsWith(matrix.name, 'linux')
        run: yum install -y ninja-build

      - name: Install Ninja (macOS)
        if: runner.os == 'macOS'
        run: brew install ninja

      - name: Install Ninja (Windows)
        if: runner.os == 'Windows'
        run: choco install ninja -y

      - name: Set up MSVC (Windows)
        if: runner.os == 'Windows'
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: x64

      # ── Python ─────────────────────────────────────────────────────────

      # manylinux containers ship multiple Pythons under /opt/python/.
      # We only need ONE because the wheel is ABI-agnostic — pick 3.12.
      # actions/setup-python is broken inside manylinux containers
      # because it tries to apt-get; symlink the manylinux Python instead.
      - name: Set up Python (manylinux)
        if: startsWith(matrix.name, 'linux')
        run: |
          ln -sf /opt/python/cp312-cp312/bin/python3 /usr/local/bin/python
          ln -sf /opt/python/cp312-cp312/bin/pip     /usr/local/bin/pip
          python --version

      - name: Set up Python (macOS / Windows)
        if: runner.os != 'Linux'
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install build tooling
        run: python -m pip install --upgrade pip build hatchling cffi wheel

      - name: Install auditwheel (Linux)
        if: startsWith(matrix.name, 'linux')
        run: python -m pip install auditwheel

      - name: Install delocate (macOS)
        if: runner.os == 'macOS'
        run: python -m pip install delocate

      # ── Build libcozip ─────────────────────────────────────────────────

      - name: Configure libcozip
        run: >
          cmake -B build -S cozip/core -G Ninja
          -DCMAKE_BUILD_TYPE=Release
          -DCMAKE_INSTALL_PREFIX=install
          -DCMAKE_INSTALL_LIBDIR=lib
          -DBUILD_SHARED_LIBS=ON
          ${{ matrix.cmake_extra }}

      - name: Build libcozip
        run: cmake --build build --config Release --parallel

      - name: Install libcozip
        run: cmake --install build --config Release

      # Ad-hoc sign the dylib to dodge Gatekeeper on user machines.
      - name: Ad-hoc sign (macOS)
        if: matrix.name == 'macos-universal'
        run: codesign --force --sign - install/lib/cozip.dylib

      # Sanity check on macOS — both arches must be present.
      - name: Verify macOS universal
        if: matrix.name == 'macos-universal'
        run: |
          DYLIB=install/lib/cozip.dylib
          lipo -info "$DYLIB"
          ARCHS=$(lipo -archs "$DYLIB")
          echo "$ARCHS" | grep -qw x86_64 || { echo "Missing x86_64"; exit 1; }
          echo "$ARCHS" | grep -qw arm64  || { echo "Missing arm64";  exit 1; }

      # ── Drop native lib into the Python package ────────────────────────

      # The Windows .dll lives in install/bin/ (RUNTIME), Unix .so/.dylib
      # in install/lib/ (LIBRARY). _resolve_lib_path() in _core.py looks
      # for cozip.{so,dylib,dll} under cozip/_lib/.
      - name: Bundle native lib (Unix)
        if: runner.os != 'Windows'
        run: |
          mkdir -p cozip/python/cozip/_lib
          cp install/lib/cozip.${{ matrix.lib_ext }} cozip/python/cozip/_lib/
          ls -la cozip/python/cozip/_lib/

      - name: Bundle native lib (Windows)
        if: runner.os == 'Windows'
        run: |
          New-Item -ItemType Directory -Force -Path cozip\python\cozip\_lib | Out-Null
          Copy-Item install\bin\cozip.dll cozip\python\cozip\_lib\
          Get-ChildItem cozip\python\cozip\_lib\

      # ── Build wheel (raw, before tag repair) ───────────────────────────

      - name: Build wheel (raw)
        working-directory: cozip/python
        run: python -m build --wheel --outdir ../../wheelhouse-raw

      # ── Repair wheel: produce a PyPI-acceptable platform tag ───────────

      # Linux: PyPI rejects the bare `linux_x86_64` / `linux_aarch64`
      # tags hatchling produces. auditwheel inspects the .so for libc
      # compatibility and re-tags the wheel as manylinux_2_28_<arch>.
      # We're already inside the manylinux_2_28 build container, so the
      # tag is honest.
      - name: Repair wheel (auditwheel, Linux)
        if: startsWith(matrix.name, 'linux')
        run: |
          mkdir -p wheelhouse
          for whl in wheelhouse-raw/*.whl; do
            echo "Repairing $whl"
            auditwheel repair "$whl" --plat ${{ matrix.manylinux_plat }} -w wheelhouse
          done
          ls -la wheelhouse/

      # macOS: hatchling tags `macosx_14_0_arm64` because the runner is
      # macOS 14 arm64, but our dylib is universal2 with deployment
      # target 11.0. Re-tag as macosx_11_0_universal2 so x86_64 users
      # on macOS 11+ also get this wheel.
      #
      # delocate-wheel: bundles any non-system dylibs into the wheel
      # (no-op for us since libcozip is already inside, but harmless
      # and required to validate dylib architectures).
      # wheel tags: rewrites the platform tag in the filename + WHEEL
      # metadata.
      - name: Repair wheel (delocate + retag, macOS)
        if: runner.os == 'macOS'
        run: |
          mkdir -p wheelhouse-delocated wheelhouse
          for whl in wheelhouse-raw/*.whl; do
            echo "Delocating $whl"
            delocate-wheel -v --require-archs x86_64,arm64 -w wheelhouse-delocated "$whl"
          done
          for whl in wheelhouse-delocated/*.whl; do
            echo "Retagging $whl -> macosx_11_0_universal2"
            python -m wheel tags \
              --platform-tag macosx_11_0_universal2 \
              --remove \
              "$whl"
            mv wheelhouse-delocated/*macosx_11_0_universal2*.whl wheelhouse/
          done
          ls -la wheelhouse/

      # Windows: win_amd64 is accepted by PyPI directly.
      - name: Pass-through wheel (Windows)
        if: runner.os == 'Windows'
        run: |
          New-Item -ItemType Directory -Force -Path wheelhouse | Out-Null
          Copy-Item wheelhouse-raw\*.whl wheelhouse\
          Get-ChildItem wheelhouse\

      # ── Verify wheel contents ──────────────────────────────────────────

      # Sanity check: the bundled native lib must actually be in the
      # wheel. Without this, hatchling's `artifacts` glob silently
      # skipping would produce a broken wheel that fails on import.
      - name: Inspect wheel (Unix)
        if: runner.os != 'Windows'
        run: |
          WHEEL=$(ls wheelhouse/*.whl | head -1)
          python -m wheel unpack "$WHEEL" --dest wheel_check
          ls -laR wheel_check
          python -c "
          import glob, sys
          libs = glob.glob('wheel_check/cozip-*/cozip/_lib/cozip.*')
          if not libs:
              print('FAIL: no native lib in wheel'); sys.exit(1)
          print('OK: bundled lib =', libs[0])
          "

      - name: Inspect wheel (Windows)
        if: runner.os == 'Windows'
        run: |
          $wheel = (Get-ChildItem wheelhouse\*.whl | Select-Object -First 1).FullName
          python -m wheel unpack $wheel --dest wheel_check
          Get-ChildItem -Recurse wheel_check
          python -c "import glob, sys; libs = glob.glob('wheel_check/cozip-*/cozip/_lib/cozip.*'); sys.exit(0 if libs else (print('FAIL: no native lib in wheel') or 1)); print('OK:', libs[0])"

      # ── Smoke test: install + import + version ─────────────────────────

      # End-to-end check that the wheel actually works on this runner:
      # install it, import cozip, confirm cffi can dlopen the bundled
      # library, and that the version matches pyproject.toml.
      - name: Install wheel and import (Unix)
        if: runner.os != 'Windows'
        run: |
          python -m pip install wheelhouse/*.whl
          python -c "
          import cozip
          print('cozip', cozip.__version__)
          print('lib loaded:', cozip.lib)
          msg = cozip.ffi.string(cozip.lib.cozip_status_string(0)).decode()
          print('status(0) =', msg)
          "

      - name: Install wheel and import (Windows)
        if: runner.os == 'Windows'
        run: |
          $wheel = (Get-ChildItem wheelhouse\*.whl | Select-Object -First 1).FullName
          python -m pip install $wheel
          python -c "import cozip; print('cozip', cozip.__version__); print('lib loaded:', cozip.lib); msg = cozip.ffi.string(cozip.lib.cozip_status_string(0)).decode(); print('status(0) =', msg)"

      # ── Upload ─────────────────────────────────────────────────────────

      - name: Upload wheel
        uses: actions/upload-artifact@v4
        with:
          name: wheel-${{ matrix.name }}
          path: wheelhouse/*.whl
          if-no-files-found: error

  # ── sdist (built once on Linux) ──────────────────────────────────────────
  # Source distribution is platform-agnostic. PyPI requires it for
  # `pip install` fallback when no wheel matches the user's platform.
  build-sdist:
    name: sdist
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Build sdist
        working-directory: cozip/python
        run: |
          python -m pip install --upgrade pip build
          python -m build --sdist --outdir ../../wheelhouse

      - uses: actions/upload-artifact@v4
        with:
          name: sdist
          path: wheelhouse/*.tar.gz
          if-no-files-found: error

  # ── Publish to PyPI on tag ───────────────────────────────────────────────
  # Uses PyPI Trusted Publishing (no API tokens). Configure on PyPI:
  # Project settings → Trusted publishers → Add publisher with this
  # workflow's repo, workflow filename (pywheels.yml), and environment
  # name (pypi).
  publish:
    name: Publish to PyPI
    needs: [build-wheels, build-sdist]
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write
    steps:
      - name: Download all wheels and sdist
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: List artifacts
        run: ls -la dist/

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1