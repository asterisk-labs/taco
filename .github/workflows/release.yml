name: Release

# Coordinated release: libcozip + Python wheel + sdist all go out under
# the same tag. R/Julia bindings live downstream — r-universe builds the
# R package on its own poll cycle, Julia is TODO.
#
# Pre-commit handles version sync across cozip/VERSION and the binding
# manifests. The validate job below double-checks the tag matches
# VERSION on disk in case someone --no-verifies past the hook.
#
# Tests don't live here. When R/Python/Julia get real test suites those
# go in a separate test.yml triggered on PR — don't fold them back in.
#
# PyPI Trusted Publisher config (must match exactly):
#   owner: asterisk-labs   repo: taco
#   workflow: release.yml  environment: pypi

on:
  push:
    tags: ['v*']
  workflow_dispatch:  # for re-running without a fresh tag (debug only)

permissions:
  contents: read


jobs:
  # Fail fast on the cheap stuff before spinning up 4 build matrices.
  validate:
    name: Validate tag
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.v.outputs.version }}
    steps:
      - uses: actions/checkout@v4

      - id: v
        name: Tag must equal cozip/VERSION
        run: |
          VERSION_FILE=$(tr -d '[:space:]' < cozip/VERSION)
          # workflow_dispatch has no tag — just trust VERSION in that case.
          if [[ "$GITHUB_REF" == refs/tags/v* ]]; then
            TAG_VERSION="${GITHUB_REF#refs/tags/v}"
            if [ "$VERSION_FILE" != "$TAG_VERSION" ]; then
              echo "::error::Tag v$TAG_VERSION does not match cozip/VERSION ($VERSION_FILE)"
              exit 1
            fi
            echo "version=$TAG_VERSION" >> "$GITHUB_OUTPUT"
          else
            echo "version=$VERSION_FILE" >> "$GITHUB_OUTPUT"
          fi


  # Build libcozip from source on every release. We used to skip this
  # when cozip/core/ hadn't changed (downloading the previous release's
  # binary instead) but the bookkeeping wasn't worth the ~5 min saved
  # on releases that happen once every few weeks.
  build-lib:
    name: libcozip — ${{ matrix.name }}
    needs: validate
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: linux-x86_64
            runner: ubuntu-24.04
            container: quay.io/pypa/manylinux_2_28_x86_64
            lib_ext: so
            shell: bash
          - name: linux-aarch64
            runner: ubuntu-24.04-arm
            container: quay.io/pypa/manylinux_2_28_aarch64
            lib_ext: so
            shell: bash
          - name: macos-universal
            runner: macos-14
            container: ''
            lib_ext: dylib
            shell: bash
            # Universal2 = arm64 + x86_64 in one fat dylib. 11.0 is
            # the floor for Apple Silicon.
            cmake_extra: >-
              "-DCMAKE_OSX_ARCHITECTURES=arm64;x86_64"
              -DCMAKE_OSX_DEPLOYMENT_TARGET=11.0
          - name: windows-x86_64
            runner: windows-2022
            container: ''
            lib_ext: dll
            shell: pwsh
    runs-on: ${{ matrix.runner }}
    container: ${{ matrix.container }}
    defaults:
      run:
        shell: ${{ matrix.shell }}
    steps:
      - uses: actions/checkout@v4

      # manylinux containers ship with gcc/cmake but no ninja. Other
      # platforms need it from the package manager.
      - if: startsWith(matrix.name, 'linux')
        run: yum install -y ninja-build
      - if: runner.os == 'macOS'
        run: brew install ninja
      - if: runner.os == 'Windows'
        run: choco install ninja -y

      # Sets up cl.exe + nmake on PATH for cmake to find.
      - if: runner.os == 'Windows'
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: x64

      - name: Configure
        run: >
          cmake -B build -S cozip/core -G Ninja
          -DCMAKE_BUILD_TYPE=Release
          -DCMAKE_INSTALL_PREFIX=install
          -DCMAKE_INSTALL_LIBDIR=lib
          -DBUILD_SHARED_LIBS=ON
          ${{ matrix.cmake_extra }}

      - run: cmake --build build --config Release --parallel
      - run: cmake --install build --config Release

      # Ad-hoc signature + sanity check that lipo actually fused both
      # arches. Without the signature, Sequoia+ rejects the dylib in
      # some sandboxed contexts (Python in a notarized app etc).
      - if: matrix.name == 'macos-universal'
        name: Sign and verify universal dylib
        run: |
          DYLIB=install/lib/cozip.dylib
          codesign --force --sign - "$DYLIB"
          ARCHS=$(lipo -archs "$DYLIB")
          echo "$ARCHS" | grep -qw x86_64 || { echo "Missing x86_64"; exit 1; }
          echo "$ARCHS" | grep -qw arm64  || { echo "Missing arm64";  exit 1; }

      # Stage the lib + headers + license into a flat dir for upload.
      # Layout matches what gh-release expects when re-packing later.
      - name: Stage artifact (Unix)
        if: runner.os != 'Windows'
        run: |
          mkdir -p staged
          cp install/lib/cozip.${{ matrix.lib_ext }} staged/
          cp install/include/cozip.h                 staged/
          cp install/include/version.h               staged/
          cp cozip/LICENSE   staged/
          cp cozip/README.md staged/

      - name: Stage artifact (Windows)
        if: runner.os == 'Windows'
        run: |
          New-Item -ItemType Directory -Force -Path staged | Out-Null
          Copy-Item install\bin\cozip.dll        staged\
          Copy-Item install\include\cozip.h      staged\
          Copy-Item install\include\version.h    staged\
          Copy-Item cozip\LICENSE                staged\
          Copy-Item cozip\README.md              staged\

      - uses: actions/upload-artifact@v4
        with:
          name: libcozip-${{ matrix.name }}
          path: staged/
          if-no-files-found: error


  # Bundle libcozip into the Python wheel, repair so it ships
  # self-contained, smoke-test, upload.
  build-wheels:
    name: Wheel — ${{ matrix.name }}
    needs: build-lib
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: linux-x86_64
            runner: ubuntu-24.04
            container: quay.io/pypa/manylinux_2_28_x86_64
            lib_ext: so
            shell: bash
            manylinux_plat: manylinux_2_28_x86_64
          - name: linux-aarch64
            runner: ubuntu-24.04-arm
            container: quay.io/pypa/manylinux_2_28_aarch64
            lib_ext: so
            shell: bash
            manylinux_plat: manylinux_2_28_aarch64
          - name: macos-universal
            runner: macos-14
            container: ''
            lib_ext: dylib
            shell: bash
          - name: windows-x86_64
            runner: windows-2022
            container: ''
            lib_ext: dll
            shell: pwsh
    runs-on: ${{ matrix.runner }}
    container: ${{ matrix.container }}
    defaults:
      run:
        shell: ${{ matrix.shell }}
    steps:
      - uses: actions/checkout@v4

      # The manylinux container has multiple Pythons under /opt/python.
      # We only need one to drive the build (the wheel is py3-none, see
      # the retag step below) so just symlink cp312 to /usr/local/bin.
      - name: Set up Python (manylinux)
        if: startsWith(matrix.name, 'linux')
        run: |
          ln -sf /opt/python/cp312-cp312/bin/python3 /usr/local/bin/python
          ln -sf /opt/python/cp312-cp312/bin/pip     /usr/local/bin/pip

      - name: Set up Python (macOS / Windows)
        if: runner.os != 'Linux'
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - run: python -m pip install --upgrade pip build hatchling cffi wheel

      # Repair tools per-platform. Windows doesn't need one — the DLL
      # just sits next to the .pyd and Windows finds it.
      - if: startsWith(matrix.name, 'linux')
        run: python -m pip install auditwheel
      - if: runner.os == 'macOS'
        run: python -m pip install delocate

      - uses: actions/download-artifact@v4
        with:
          name: libcozip-${{ matrix.name }}
          path: libcozip-bin/

      # Drop the lib into cozip/_lib/ where _core.py looks for it
      # at import time. See _resolve_lib_path() in cozip/_core.py.
      - name: Bundle native lib (Unix)
        if: runner.os != 'Windows'
        run: |
          mkdir -p cozip/python/cozip/_lib
          cp libcozip-bin/cozip.${{ matrix.lib_ext }} cozip/python/cozip/_lib/

      - name: Bundle native lib (Windows)
        if: runner.os == 'Windows'
        run: |
          New-Item -ItemType Directory -Force -Path cozip\python\cozip\_lib | Out-Null
          Copy-Item libcozip-bin\cozip.dll cozip\python\cozip\_lib\

      - name: Build wheel
        working-directory: cozip/python
        run: python -m build --wheel --outdir ../../wheelhouse-raw

      # Repair = rewrite the runtime loader path so the wheel works on
      # systems without our build env. Different surgery per platform:
      #   Linux  -> auditwheel (ELF rpath + glibc tag baking)
      #   macOS  -> delocate   (Mach-O install_name)
      # Then we retag to py3-none-<plat> so a single wheel covers every
      # CPython version. Safe because we go through cffi/dlopen — no
      # CPython ABI dependency.
      - name: Repair (Linux)
        if: startsWith(matrix.name, 'linux')
        run: |
          mkdir -p wheelhouse-repaired wheelhouse
          for whl in wheelhouse-raw/*.whl; do
            auditwheel repair "$whl" --plat ${{ matrix.manylinux_plat }} -w wheelhouse-repaired
          done
          for whl in wheelhouse-repaired/*.whl; do
            python -m wheel tags --python-tag py3 --abi-tag none --remove "$whl"
          done
          mv wheelhouse-repaired/*.whl wheelhouse/

      - name: Repair (macOS)
        if: runner.os == 'macOS'
        run: |
          mkdir -p wheelhouse-delocated wheelhouse
          for whl in wheelhouse-raw/*.whl; do
            delocate-wheel -v --require-archs x86_64,arm64 -w wheelhouse-delocated "$whl"
          done
          for whl in wheelhouse-delocated/*.whl; do
            python -m wheel tags \
              --platform-tag macosx_11_0_universal2 \
              --python-tag py3 --abi-tag none --remove "$whl"
          done
          mv wheelhouse-delocated/*.whl wheelhouse/

      # Windows: just retag, no surgery needed.
      - name: Repair (Windows)
        if: runner.os == 'Windows'
        run: |
          New-Item -ItemType Directory -Force -Path wheelhouse-raw2 | Out-Null
          New-Item -ItemType Directory -Force -Path wheelhouse | Out-Null
          Copy-Item wheelhouse-raw\*.whl wheelhouse-raw2\
          Get-ChildItem wheelhouse-raw2\*.whl | ForEach-Object {
            python -m wheel tags --python-tag py3 --abi-tag none --remove $_.FullName
          }
          Move-Item wheelhouse-raw2\*.whl wheelhouse\

      # Smoke test on the same runner that built the wheel. This catches
      # most "lib didn't bundle correctly" failures before PyPI sees them.
      # The cozip_status_string assertion exercises the cffi binding,
      # not just the Python import.
      - name: Smoke test (Unix)
        if: runner.os != 'Windows'
        run: |
          python -m pip install wheelhouse/*.whl
          python -c "
          import cozip
          print('cozip', cozip.__version__)
          assert cozip.lib.cozip_status_string(0)
          "

      - name: Smoke test (Windows)
        if: runner.os == 'Windows'
        run: |
          $wheel = (Get-ChildItem wheelhouse\*.whl | Select-Object -First 1).FullName
          python -m pip install $wheel
          python -c "import cozip; print('cozip', cozip.__version__)"

      - uses: actions/upload-artifact@v4
        with:
          name: wheel-${{ matrix.name }}
          path: wheelhouse/*.whl
          if-no-files-found: error


  # sdist is cheap, runs in parallel with everything else.
  build-sdist:
    name: sdist
    needs: validate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - working-directory: cozip/python
        run: |
          python -m pip install --upgrade pip build
          python -m build --sdist --outdir ../../sdist-out
      - uses: actions/upload-artifact@v4
        with:
          name: sdist
          path: sdist-out/*.tar.gz
          if-no-files-found: error


  # Re-pack each libcozip-<plat> artifact into a versioned tarball/zip
  # so people can grab e.g. libcozip-2026.4.29-linux-x86_64.tar.gz
  # straight from the Releases page. Skipped on workflow_dispatch
  # because that path is for debugging — we don't want accidental
  # release publishes.
  gh-release:
    name: GitHub Release
    needs: [validate, build-lib]
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          pattern: libcozip-*
          path: artifacts/

      - name: Re-pack into versioned archives
        run: |
          set -euo pipefail
          VERSION="${{ needs.validate.outputs.version }}"
          mkdir -p release-files staging

          for plat_dir in artifacts/libcozip-*; do
            plat=$(basename "$plat_dir" | sed 's/^libcozip-//')
            pkg="libcozip-${VERSION}-${plat}"
            stage="staging/${pkg}"
            mkdir -p "$stage/include"

            # Convention: shared lib goes in lib/ on Unix and bin/ on
            # Windows, matching what their respective package managers
            # and toolchains expect (pkg-config, MSVC, etc).
            case "$plat" in
              windows-x86_64)
                mkdir -p "$stage/bin"
                cp "$plat_dir/cozip.dll" "$stage/bin/"
                ;;
              macos-universal)
                mkdir -p "$stage/lib"
                cp "$plat_dir/cozip.dylib" "$stage/lib/"
                ;;
              linux-*)
                mkdir -p "$stage/lib"
                cp "$plat_dir/cozip.so" "$stage/lib/"
                ;;
            esac
            cp "$plat_dir/cozip.h"   "$stage/include/"
            cp "$plat_dir/version.h" "$stage/include/"
            cp "$plat_dir/LICENSE"   "$stage/"
            cp "$plat_dir/README.md" "$stage/"

            (cd staging && \
              if [ "$plat" = "windows-x86_64" ]; then
                zip -qr "../release-files/${pkg}.zip" "$pkg"
              else
                tar czf "../release-files/${pkg}.tar.gz" "$pkg"
              fi)
          done

      # Anything with a hyphen in the version (2026.5.1-rc1 etc) is
      # treated as a prerelease.
      - uses: softprops/action-gh-release@v2
        with:
          files: release-files/*
          generate_release_notes: true
          draft: false
          prerelease: ${{ contains(github.ref, '-') }}


  # Trusted Publishing → no API token needed, just OIDC. The 'pypi'
  # environment is configured on PyPI to accept this exact workflow.
  publish-pypi:
    name: Publish to PyPI
    needs: [build-wheels, build-sdist]
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write
    steps:
      # Pull every wheel-* artifact into a single dist/ directory.
      # merge-multiple flattens them in place.
      - uses: actions/download-artifact@v4
        with:
          path: dist
          pattern: 'wheel-*'
          merge-multiple: true
      - uses: actions/download-artifact@v4
        with:
          name: sdist
          path: dist
      - run: ls -la dist/
      - uses: pypa/gh-action-pypi-publish@release/v1