<svg width="100%" viewBox="0 0 680 470" role="img" xmlns="http://www.w3.org/2000/svg" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif">
  <title>cozip index entry structure</title>
  <desc>The index entry has two parts. The Local File Header occupies a fixed 51 bytes split into a 30-byte fixed header, the 9-byte filename "__cozip__", and the 12-byte cozip hash block. The payload, starting at byte 51, contains the cozip index in five contiguous sections: an 11-byte header followed by name lengths, names, offsets, and sizes.</desc>

  <text x="160" y="82" text-anchor="end" font-family="ui-monospace, 'SF Mono', Menlo, monospace" font-size="11" fill="#888780">byte 0</text>

  <rect x="180" y="70" width="320" height="140" rx="6" fill="#E1F5EE" stroke="#0F6E56" stroke-width="0.5"/>

  <text x="340" y="92" text-anchor="middle" font-size="14" font-weight="500" fill="#04342C">Local File Header</text>
  <text x="340" y="106" text-anchor="middle" font-size="12" fill="#0F6E56">51 bytes</text>

  <line x1="186" y1="114" x2="494" y2="114" stroke="#0F6E56" stroke-width="0.5"/>

  <text x="240" y="134" text-anchor="middle" font-family="ui-monospace, 'SF Mono', Menlo, monospace" font-size="11" fill="#0F6E56">30 bytes</text>
  <text x="400" y="134" text-anchor="middle" font-size="12" fill="#085041">Fixed header fields</text>

  <line x1="186" y1="146" x2="494" y2="146" stroke="#0F6E56" stroke-width="0.5" stroke-dasharray="2,2"/>

  <text x="240" y="166" text-anchor="middle" font-family="ui-monospace, 'SF Mono', Menlo, monospace" font-size="11" fill="#0F6E56">9 bytes</text>
  <text x="400" y="166" text-anchor="middle" font-size="12" fill="#085041">Filename "__cozip__"</text>

  <line x1="186" y1="178" x2="494" y2="178" stroke="#0F6E56" stroke-width="0.5" stroke-dasharray="2,2"/>

  <text x="240" y="198" text-anchor="middle" font-family="ui-monospace, 'SF Mono', Menlo, monospace" font-size="11" fill="#0F6E56">12 bytes</text>
  <text x="400" y="198" text-anchor="middle" font-size="12" fill="#085041">cozip hash block</text>

  <text x="160" y="236" text-anchor="end" font-family="ui-monospace, 'SF Mono', Menlo, monospace" font-size="11" fill="#888780">byte 51</text>

  <rect x="180" y="224" width="320" height="212" rx="6" fill="#E1F5EE" stroke="#0F6E56" stroke-width="0.5"/>

  <text x="340" y="246" text-anchor="middle" font-size="14" font-weight="500" fill="#04342C">cozip index</text>
  <text x="340" y="260" text-anchor="middle" font-size="12" fill="#0F6E56">5 contiguous sections</text>

  <line x1="186" y1="268" x2="494" y2="268" stroke="#0F6E56" stroke-width="0.5"/>

  <text x="240" y="288" text-anchor="middle" font-family="ui-monospace, 'SF Mono', Menlo, monospace" font-size="11" fill="#0F6E56">11 bytes</text>
  <text x="400" y="288" text-anchor="middle" font-size="12" fill="#085041">Header</text>

  <line x1="186" y1="302" x2="494" y2="302" stroke="#0F6E56" stroke-width="0.5" stroke-dasharray="2,2"/>

  <text x="240" y="322" text-anchor="middle" font-family="ui-monospace, 'SF Mono', Menlo, monospace" font-size="11" fill="#0F6E56">N × 2 bytes</text>
  <text x="400" y="322" text-anchor="middle" font-size="12" fill="#085041">Name lengths</text>

  <line x1="186" y1="336" x2="494" y2="336" stroke="#0F6E56" stroke-width="0.5" stroke-dasharray="2,2"/>

  <text x="240" y="356" text-anchor="middle" font-family="ui-monospace, 'SF Mono', Menlo, monospace" font-size="11" fill="#0F6E56">variable</text>
  <text x="400" y="356" text-anchor="middle" font-size="12" fill="#085041">Names (UTF-8)</text>

  <line x1="186" y1="370" x2="494" y2="370" stroke="#0F6E56" stroke-width="0.5" stroke-dasharray="2,2"/>

  <text x="240" y="390" text-anchor="middle" font-family="ui-monospace, 'SF Mono', Menlo, monospace" font-size="11" fill="#0F6E56">N × 8 bytes</text>
  <text x="400" y="390" text-anchor="middle" font-size="12" fill="#085041">Offsets</text>

  <line x1="186" y1="404" x2="494" y2="404" stroke="#0F6E56" stroke-width="0.5" stroke-dasharray="2,2"/>

  <text x="240" y="424" text-anchor="middle" font-family="ui-monospace, 'SF Mono', Menlo, monospace" font-size="11" fill="#0F6E56">N × 8 bytes</text>
  <text x="400" y="424" text-anchor="middle" font-size="12" fill="#085041">Sizes</text>
</svg>