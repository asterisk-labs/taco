<svg viewBox="0 0 400 420" width="100%" xmlns="http://www.w3.org/2000/svg">
  <style>
    .title { font: 700 11px 'Segoe UI', sans-serif; fill: #1f2937; text-anchor: middle; }
    .label { font: 600 9px 'Segoe UI', sans-serif; fill: #64748b; text-anchor: middle; }
    .label-sm { font: 400 8px 'Segoe UI', sans-serif; fill: #94a3b8; text-anchor: middle; }
    .size { font: 700 9px 'JetBrains Mono', monospace; text-anchor: middle; }
    .arrow-label { font: 600 8px 'Segoe UI', sans-serif; fill: #dc2626; text-anchor: middle; }
    .arrow-label-g { font: 600 8px 'Segoe UI', sans-serif; fill: #16a34a; text-anchor: middle; }
    .mono { font: 500 7.5px 'JetBrains Mono', monospace; fill: #64748b; text-anchor: middle; }
  </style>

  <!-- === NORMAL ZIP === -->
  <text class="title" x="100" y="24">Normal ZIP</text>

  <!-- Archive body -->
  <rect x="40" y="40" width="120" height="320" rx="6" fill="#f9fafb" stroke="#d1d5db" stroke-width="1.5"/>

  <!-- Data files -->
  <rect x="48" y="48" width="104" height="200" rx="4" fill="#e0e7ff" opacity="0.4"/>
  <text class="label" x="100" y="110">DATA</text>
  <text class="label-sm" x="100" y="125">3M files</text>

  <!-- CD at the end -->
  <rect x="48" y="260" width="104" height="90" rx="4" fill="#fecaca"/>
  <text class="label" x="100" y="300" fill="#991b1b">Central Directory</text>
  <text class="size" x="100" y="316" fill="#dc2626">~200 MB</text>
  <text class="label-sm" x="100" y="332" fill="#991b1b">at the end</text>

  <!-- Arrow: read from tail -->
  <line x1="170" y1="355" x2="170" y2="305" stroke="#dc2626" stroke-width="1.5" marker-end="url(#arrowRed)"/>
  <text class="arrow-label" x="193" y="350">fetch tail</text>
  <text class="arrow-label" x="193" y="362">first</text>

  <!-- Byte labels -->
  <text class="mono" x="100" y="372">byte 0</text>
  <text class="mono" x="30" y="52" text-anchor="end">0</text>
  <text class="mono" x="30" y="356" text-anchor="end">EOF</text>

  <!-- === CLOUD-OPTIMIZED ZIP === -->
  <text class="title" x="300" y="24">Cloud-Optimized ZIP</text>

  <!-- Archive body -->
  <rect x="240" y="40" width="120" height="320" rx="6" fill="#f9fafb" stroke="#d1d5db" stroke-width="1.5"/>

  <!-- COZ index at byte 0 -->
  <rect x="248" y="48" width="104" height="28" rx="4" fill="#bbf7d0"/>
  <text class="label" x="300" y="66" fill="#166534">JSON index</text>
  <text class="size" x="300" y="56" fill="#16a34a">~2 KB</text>

  <!-- Parquets right after -->
  <rect x="248" y="82" width="104" height="40" rx="4" fill="#dbeafe"/>
  <text class="label" x="300" y="100" fill="#1e40af">METADATA/</text>
  <text class="label-sm" x="300" y="112" fill="#1e40af">Parquets</text>

  <!-- Data files -->
  <rect x="248" y="128" width="104" height="182" rx="4" fill="#e0e7ff" opacity="0.4"/>
  <text class="label" x="300" y="220">DATA</text>
  <text class="label-sm" x="300" y="235">3M files</text>

  <!-- CD at the end (grayed out) -->
  <rect x="248" y="316" width="104" height="36" rx="4" fill="#f3f4f6" stroke="#e5e7eb" stroke-dasharray="3 2"/>
  <text class="label-sm" x="300" y="338" fill="#cbd5e1">CD (ignored)</text>

  <!-- Arrow: read from start -->
  <line x1="232" y1="38" x2="232" y2="88" stroke="#16a34a" stroke-width="1.5" marker-end="url(#arrowGreen)"/>
  <text class="arrow-label-g" x="222" y="50" text-anchor="end">read</text>
  <text class="arrow-label-g" x="222" y="62" text-anchor="end">start</text>

  <!-- Byte labels -->
  <text class="mono" x="300" y="372">byte 0</text>
  <text class="mono" x="370" y="52" text-anchor="start">0</text>
  <text class="mono" x="370" y="356" text-anchor="start">EOF</text>

  <!-- Arrow markers -->
  <defs>
    <marker id="arrowRed" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#dc2626"/>
    </marker>
    <marker id="arrowGreen" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#16a34a"/>
    </marker>
  </defs>
</svg>