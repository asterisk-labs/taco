<svg viewBox="0 0 400 480" width="100%" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <filter id="shadow" x="-50%" y="-50%" width="200%" height="200%">
      <feDropShadow dx="0" dy="2" stdDeviation="2.5" flood-color="#000" flood-opacity="0.15"/>
    </filter>
    <g id="ball-p">
      <circle r="20" fill="#D4B8E8" stroke="#A888C0" stroke-width="1"/>
      <circle cx="-8" cy="2" r="5" fill="#FFE6A3" stroke="#D8C060" stroke-width="0.6"/>
      <circle cx="4" cy="-6" r="5" fill="#FFE6A3" stroke="#D8C060" stroke-width="0.6"/>
      <circle cx="8" cy="6" r="5" fill="#FFE6A3" stroke="#D8C060" stroke-width="0.6"/>
    </g>
  </defs>

  <style>
    .lab { font: 600 12px 'Segoe UI', sans-serif; fill: #999; }
    .gl { font: 700 16px 'Segoe UI', sans-serif; fill: #1a1a1a; }
    .gs { font: 400 10px 'Segoe UI', sans-serif; fill: #aaa; }
    .traveler { filter: url(#shadow); opacity: 0; }

    /* 13.5s cycle (was 18s — 25% faster) */
    @keyframes m1 {
      0%    { transform:translate(70px,150px); opacity:0; }
      1%    { transform:translate(70px,150px); opacity:1; }
      10%   { transform:translate(200px,240px); opacity:1; }
      18%   { transform:translate(200px,240px); opacity:1; }
      24%   { transform:translate(330px,150px); opacity:1; }
      25%   { transform:translate(330px,150px); opacity:1; }
      100%  { transform:translate(330px,150px); opacity:1; }
    }
    @keyframes m2 {
      0%,25%  { opacity:0; transform:translate(70px,210px); }
      27%     { opacity:1; transform:translate(70px,210px); }
      36%     { transform:translate(200px,240px); opacity:1; }
      44%     { transform:translate(200px,240px); opacity:1; }
      49%     { transform:translate(70px,210px); opacity:1; }
      50%     { transform:translate(70px,210px); opacity:0; }
      100%    { opacity:0; }
    }
    @keyframes m3 {
      0%,50%  { opacity:0; transform:translate(70px,270px); }
      52%     { opacity:1; transform:translate(70px,270px); }
      60%     { transform:translate(200px,240px); opacity:1; }
      68%     { transform:translate(200px,240px); opacity:1; }
      74%     { transform:translate(330px,270px); opacity:1; }
      75%     { transform:translate(330px,270px); opacity:1; }
      100%    { transform:translate(330px,270px); opacity:1; }
    }
    @keyframes m4 {
      0%,75%  { opacity:0; transform:translate(70px,330px); }
      77%     { opacity:1; transform:translate(70px,330px); }
      86%     { transform:translate(200px,240px); opacity:1; }
      94%     { transform:translate(200px,240px); opacity:1; }
      99%     { transform:translate(70px,330px); opacity:1; }
      100%    { transform:translate(70px,330px); opacity:0; }
    }

    .t1 { animation: m1 13.5s ease-in-out infinite; }
    .t2 { animation: m2 13.5s ease-in-out infinite; }
    .t3 { animation: m3 13.5s ease-in-out infinite; }
    .t4 { animation: m4 13.5s ease-in-out infinite; }

    .gate-r { animation: gborder 13.5s ease-in-out infinite; }
    @keyframes gborder {
      0%  { stroke:#ccc; }
      9%  { stroke:#ccc; } 11% { stroke:#16a34a; } 17% { stroke:#16a34a; } 19% { stroke:#ccc; }
      35% { stroke:#ccc; } 37% { stroke:#dc2626; } 43% { stroke:#dc2626; } 45% { stroke:#ccc; }
      59% { stroke:#ccc; } 61% { stroke:#16a34a; } 67% { stroke:#16a34a; } 69% { stroke:#ccc; }
      85% { stroke:#ccc; } 87% { stroke:#dc2626; } 93% { stroke:#dc2626; } 95% { stroke:#ccc; }
      100%{ stroke:#ccc; }
    }

    .v-s1 { animation: vs1 13.5s ease-in-out infinite; }
    @keyframes vs1 {
      0%  { fill:#eee; stroke:#eee; }
      9%  { fill:#eee; stroke:#eee; } 11% { fill:#16a34a; stroke:#16a34a; } 17% { fill:#16a34a; stroke:#16a34a; } 19% { fill:#eee; stroke:#eee; }
      35% { fill:#eee; stroke:#eee; } 37% { fill:#dc2626; stroke:#dc2626; } 43% { fill:#dc2626; stroke:#dc2626; } 45% { fill:#eee; stroke:#eee; }
      59% { fill:#eee; stroke:#eee; } 61% { fill:#16a34a; stroke:#16a34a; } 67% { fill:#16a34a; stroke:#16a34a; } 69% { fill:#eee; stroke:#eee; }
      85% { fill:#eee; stroke:#eee; } 87% { fill:#dc2626; stroke:#dc2626; } 93% { fill:#dc2626; stroke:#dc2626; } 95% { fill:#eee; stroke:#eee; }
      100%{ fill:#eee; stroke:#eee; }
    }

    .v-s2 { animation: vs2 13.5s ease-in-out infinite; }
    @keyframes vs2 {
      0%  { fill:#eee; stroke:#eee; }
      9%  { fill:#eee; stroke:#eee; } 11% { fill:#16a34a; stroke:#16a34a; } 17% { fill:#16a34a; stroke:#16a34a; } 19% { fill:#eee; stroke:#eee; }
      35% { fill:#eee; stroke:#eee; } 45% { fill:#eee; stroke:#eee; }
      59% { fill:#eee; stroke:#eee; } 61% { fill:#16a34a; stroke:#16a34a; } 67% { fill:#16a34a; stroke:#16a34a; } 69% { fill:#eee; stroke:#eee; }
      85% { fill:#eee; stroke:#eee; } 87% { fill:#dc2626; stroke:#dc2626; } 93% { fill:#dc2626; stroke:#dc2626; } 95% { fill:#eee; stroke:#eee; }
      100%{ fill:#eee; stroke:#eee; }
    }

    .v-s3 { animation: vs3 13.5s ease-in-out infinite; }
    @keyframes vs3 {
      0%  { fill:#eee; stroke:#eee; }
      9%  { fill:#eee; stroke:#eee; } 11% { fill:#16a34a; stroke:#16a34a; } 17% { fill:#16a34a; stroke:#16a34a; } 19% { fill:#eee; stroke:#eee; }
      35% { fill:#eee; stroke:#eee; } 45% { fill:#eee; stroke:#eee; }
      59% { fill:#eee; stroke:#eee; } 61% { fill:#16a34a; stroke:#16a34a; } 67% { fill:#16a34a; stroke:#16a34a; } 69% { fill:#eee; stroke:#eee; }
      85% { fill:#eee; stroke:#eee; } 95% { fill:#eee; stroke:#eee; }
      100%{ fill:#eee; stroke:#eee; }
    }

    .v-m1 { animation: vs1 13.5s ease-in-out infinite; }
    .v-m2 { animation: vs2 13.5s ease-in-out infinite; }
    .v-m3 { animation: vs3 13.5s ease-in-out infinite; }
  </style>

  <!-- Left container -->
  <text class="lab" x="70" y="60" text-anchor="middle">Samples</text>
  <rect x="20" y="78" width="100" height="320" rx="12" fill="#f9fafb" stroke="#ddd" stroke-dasharray="4 3"/>
  <g opacity="0.15">
    <use href="#ball-p" x="70" y="150"/>
    <use href="#ball-p" x="70" y="210"/>
    <use href="#ball-p" x="70" y="270"/>
    <use href="#ball-p" x="70" y="330"/>
  </g>

  <!-- Gate -->
  <rect class="gate-r" x="160" y="160" width="80" height="160" rx="8" fill="#fff" stroke="#ccc" stroke-width="2"/>
  <text class="gl" x="200" y="245" text-anchor="middle">σ ∧ μ</text>
  <text class="gs" x="200" y="335" text-anchor="middle">CONTRACT</text>

  <!-- σ validators -->
  <g transform="translate(185, 175)">
    <circle cx="5" cy="5" r="4" class="v-s1" stroke-width="1.5"/>
    <circle cx="25" cy="5" r="4" class="v-s2" stroke-width="1.5"/>
    <circle cx="15" cy="15" r="4" class="v-s3" stroke-width="1.5"/>
    <text x="15" y="32" class="gs" text-anchor="middle" style="font-size:7px">tree (σ)</text>
  </g>

  <!-- μ validators -->
  <g transform="translate(185, 270)">
    <rect width="30" height="2.5" rx="1" class="v-m1"/>
    <rect y="6" width="20" height="2.5" rx="1" class="v-m2"/>
    <rect y="12" width="25" height="2.5" rx="1" class="v-m3"/>
    <text x="15" y="28" class="gs" text-anchor="middle" style="font-size:7px">schema (μ)</text>
  </g>

  <!-- Right container -->
  <text class="lab" x="330" y="60" text-anchor="middle">TACO dataset</text>
  <rect x="280" y="78" width="100" height="320" rx="12" fill="#f9fafb" stroke="#ddd" stroke-dasharray="4 3"/>

  <!-- Travelers -->
  <g class="traveler t1"><use href="#ball-p"/></g>
  <g class="traveler t2">
    <circle r="20" fill="#D4B8E8" stroke="#A888C0" stroke-width="1"/>
    <circle cx="-8" cy="2" r="5" fill="#B5D4F4" stroke="#85B7EB" stroke-width="0.6"/>
    <circle cx="4" cy="-6" r="5" fill="#FFE6A3" stroke="#D8C060" stroke-width="0.6"/>
    <circle cx="8" cy="6" r="5" fill="#FFE6A3" stroke="#D8C060" stroke-width="0.6"/>
  </g>
  <g class="traveler t3"><use href="#ball-p"/></g>
  <g class="traveler t4">
    <circle r="20" fill="#D4B8E8" stroke="#A888C0" stroke-width="1"/>
    <circle cx="-8" cy="2" r="5" fill="#FFE6A3" stroke="#D8C060" stroke-width="0.6"/>
  </g>
</svg>